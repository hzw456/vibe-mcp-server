version: '3.8'

services:
  vibe-mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vibe-mcp-server
    ports:
      - "3010:3010"
    restart: unless-stopped
    environment:
      - API_KEY=${API_KEY:-vibe-mcp-secret-key}
      - HOST=0.0.0.0
      - PORT=3010
      - TZ=Asia/Shanghai
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3010/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  default:
    name: vibe-mcp-network
